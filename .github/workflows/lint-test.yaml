name: Lint and Test Charts

# on: 
#   workflow_run:
#     workflows: [Documentation]
#     types: 
#       - completed

on:
  pull_request:

permissions:
  contents: read
  id-token: write  # required for OIDC to assume the ECR-pull IAM role

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      MAESTROD_ECR_REGISTRY: 111300957880.dkr.ecr.eu-west-1.amazonaws.com
      MAESTROD_ECR_REPOSITORY: maestrod
      MAESTROD_ECR_TAG: nightly
      AWS_REGION: eu-west-1
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: latest

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --excluded-charts signing-service-example --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$changed" | grep -qx 'charts/maestrod'; then
            echo "maestrod-changed=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$changed" | grep -v '^charts/maestrod$' | grep -q .; then
            echo "non-maestrod-changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1

      - name: Configure AWS credentials (for ECR pull)
        if: steps.list-changed.outputs.maestrod-changed == 'true'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_CI_ECR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: steps.list-changed.outputs.maestrod-changed == 'true'
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Side-load maestrod image into kind
        if: steps.list-changed.outputs.maestrod-changed == 'true'
        run: |
          IMAGE="${MAESTROD_ECR_REGISTRY}/${MAESTROD_ECR_REPOSITORY}:${MAESTROD_ECR_TAG}"
          docker pull "$IMAGE"
          kind load docker-image "$IMAGE" --name chart-testing

      - name: Install Gateway API CRDs
        if: steps.list-changed.outputs.non-maestrod-changed == 'true'
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.0/standard-install.yaml
          kubectl wait --for=condition=Established crd/gatewayclasses.gateway.networking.k8s.io --timeout=120s
          kubectl wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=120s
          kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=120s

      - name: Install CloudNativePG
        if: steps.list-changed.outputs.non-maestrod-changed == 'true'
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm upgrade --install cnpg \
            --namespace cnpg-system --create-namespace \
            cnpg/cloudnative-pg
          kubectl wait \
            --namespace cnpg-system \
            --for=condition=Available=true \
            deployment \
            -l app.kubernetes.io/name=cloudnative-pg \
            --timeout=300s
          kubectl wait \
            --namespace cnpg-system \
            --for=condition=Ready=true \
            pod \
            -l app.kubernetes.io/name=cloudnative-pg \
            --timeout=300s
          kubectl wait \
            --namespace cnpg-system \
            --for=jsonpath='{.subsets[0].addresses[0].ip}' \
            endpoints/cnpg-webhook-service \
            --timeout=300s

      - name: Install Garage
        if: steps.list-changed.outputs.non-maestrod-changed == 'true'
        run: |
          kubectl create namespace whatever --dry-run=client -o yaml | kubectl apply -f -
          cat <<'EOF' | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: garage-config
            namespace: whatever
          data:
            garage.toml: |
              metadata_dir = "/var/lib/garage/meta"
              data_dir = "/var/lib/garage/data"
              db_engine = "sqlite"

              replication_factor = 1

              rpc_bind_addr = "[::]:3901"
              rpc_public_addr = "garage.whatever.svc.cluster.local:3901"
              rpc_secret = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

              [s3_api]
              s3_region = "us-east-1"
              api_bind_addr = "[::]:3900"

              [admin]
              api_bind_addr = "[::]:3903"
              admin_token = "garage-admin-token-for-ci"
              metrics_token = "garage-metrics-token-for-ci"
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: garage
            namespace: whatever
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: garage
            template:
              metadata:
                labels:
                  app: garage
              spec:
                containers:
                  - name: garage
                    image: dxflrs/garage:v2.3.0
                    imagePullPolicy: IfNotPresent
                    args:
                      - /garage
                      - server
                      - --single-node
                      - --default-bucket
                    env:
                      - name: GARAGE_DEFAULT_ACCESS_KEY
                        value: nutrient
                      - name: GARAGE_DEFAULT_SECRET_KEY
                        value: despairIsUnbearable87
                      - name: GARAGE_DEFAULT_BUCKET
                        value: whatever
                    ports:
                      - containerPort: 3900
                        name: s3
                      - containerPort: 3901
                        name: rpc
                      - containerPort: 3903
                        name: admin
                    volumeMounts:
                      - name: config
                        mountPath: /etc/garage.toml
                        subPath: garage.toml
                      - name: meta
                        mountPath: /var/lib/garage/meta
                      - name: data
                        mountPath: /var/lib/garage/data
                volumes:
                  - name: config
                    configMap:
                      name: garage-config
                  - name: meta
                    emptyDir: {}
                  - name: data
                    emptyDir: {}
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: garage
            namespace: whatever
          spec:
            selector:
              app: garage
            ports:
              - name: s3
                port: 80
                targetPort: 3900
              - name: rpc
                port: 3901
                targetPort: 3901
              - name: admin
                port: 3903
                targetPort: 3903
          EOF
          kubectl rollout status deployment/garage --namespace whatever --timeout=300s
          cat <<'EOF' | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: garage-create-buckets
            namespace: whatever
          spec:
            backoffLimit: 6
            template:
              spec:
                restartPolicy: OnFailure
                containers:
                  - name: aws-cli
                    image: amazon/aws-cli:2.17.40
                    imagePullPolicy: IfNotPresent
                    command:
                      - /bin/sh
                      - -ec
                      - |
                        until aws --endpoint-url http://garage.whatever.svc.cluster.local s3 ls >/dev/null 2>&1; do
                          sleep 1
                        done
                        aws --endpoint-url http://garage.whatever.svc.cluster.local s3api create-bucket \
                          --bucket whatever \
                          --region us-east-1 || true
                    env:
                      - name: AWS_ACCESS_KEY_ID
                        value: nutrient
                      - name: AWS_SECRET_ACCESS_KEY
                        value: despairIsUnbearable87
                      - name: AWS_DEFAULT_REGION
                        value: us-east-1
                      - name: AWS_EC2_METADATA_DISABLED
                        value: "true"
          EOF
          kubectl wait --namespace whatever --for=condition=complete job/garage-create-buckets --timeout=300s

      - name: Run chart-testing (install) — public-image charts
        if: steps.list-changed.outputs.non-maestrod-changed == 'true'
        # Public Nutrient charts (document-engine, ai-assistant, …): keep the
        # original `pullPolicy=Always` behaviour so the nightly tag is always
        # re-pulled from Docker Hub. Maestrod is excluded here and installed
        # separately below against its kind-loaded ECR image.
        run: |
          helm repo add nutrient https://pspdfkit.github.io/helm-charts
          ct install --target-branch ${{ github.event.repository.default_branch }} \
                     --excluded-charts maestrod \
                     --helm-extra-args "--timeout 300s" \
                     --helm-extra-set-args "--set=image.tag=nightly" \
                     --helm-extra-set-args "--set=image.pullPolicy=Always"

      - name: Run chart-testing (install) — maestrod (ECR side-loaded)
        if: steps.list-changed.outputs.maestrod-changed == 'true'
        # Maestrod's image lives in a private ECR; the workflow pulls it on
        # the runner and side-loads it into the kind node above. We omit
        # `pullPolicy=Always` here so kubelet uses the loaded image
        # (the chart's `IfNotPresent` default) instead of trying to re-pull
        # from a registry kind has no credentials for.
        run: |
          ct install --target-branch ${{ github.event.repository.default_branch }} \
                     --charts charts/maestrod \
                     --helm-extra-args "--timeout 300s" \
                     --helm-extra-set-args "--set=image.tag=${MAESTROD_ECR_TAG}"
