{{- if and .Values.database.enabled 
           .Values.database.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "document-engine.fullname" . }}-db-migration
  labels:
    {{- include "document-engine.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
spec:
  ttlSecondsAfterFinished: {{ .Values.database.migrationJob.ttlSecondsAfterFinished }}
  template:
    metadata:
      name: {{ include "document-engine.fullname" . }}-db-migration
      annotations:
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.database.migrationJob.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "document-engine.migrationSelectorLabels" . | nindent 8 }}
      {{- with .Values.database.migrationJob.podLabels }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "document-engine.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.initContainers }}
      initContainers:
        {{ toYaml .Values.initContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          envFrom:
            - configMapRef:
                name: {{ include "document-engine.fullname" . }}
            - secretRef:
                name: {{ include "document-engine.fullname" . }}
          {{- if .Values.database.postgres.externalAdminSecretName  }}
            - secretRef:
                name: {{ .Values.database.postgres.externalAdminSecretName }}
          {{- end }}

          {{- if and .Values.assetStorage.redis.enabled 
                     .Values.assetStorage.redis.externalSecretName }}
            - secretRef:
                name: {{ .Values.assetStorage.redis.externalSecretName }}
          {{- end }}
          {{- if and (eq (include "document-engine.storage.s3.enabled" .) "true") 
                     .Values.assetStorage.s3.externalSecretName }}
            - secretRef:
                name: {{ .Values.assetStorage.s3.externalSecretName }}
          {{- end }}
          {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
          {{- if .Values.documentEngineLicense.externalSecret.name }}
            - name: ACTIVATION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.documentEngineLicense.externalSecret.name }}
                  key: {{ .Values.documentEngineLicense.externalSecret.key }}
          {{- end }}
            - name: ENABLE_DATABASE_MIGRATIONS
              value: 'true'
            - name: EXIT_AFTER_DATABASE_MIGRATIONS
              value: 'true'
          {{- if .Values.apiAuth.externalSecret.name }}
            {{- with .Values.apiAuth.externalSecret }}
              {{- if .secretKeyBaseKey }}
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ .name }}
                  key: {{ .secretKeyBaseKey }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- with .Values.extraEnvs }}
            {{- toYaml .| nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.database.migrationJob.resources | nindent 12 }}
          {{- if or .Values.extraVolumeMounts 
                    .Values.certificateTrust.customCertificates }}
          volumeMounts:
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- include "document-engine.certificateTrust.customCertificates.volumeMounts" . | nindent 12 }}
          {{- end }}
      {{- if .Values.sidecars }}
        {{ toYaml .Values.sidecars | nindent 8 }}
      {{- end }}
      {{- if or .Values.extraVolumeMounts 
                .Values.certificateTrust.customCertificates }}
      volumes:
        {{- with .Values.extraVolumes }}
        {{ toYaml . | nindent 8 }}
        {{- end }}
        {{- include "document-engine.certificateTrust.customCertificates.volumes" . | nindent 8 }}
      {{- end }}
      {{- include "document-engine.scheduling" . | nindent 6 }}
{{- end }}
