{{- $fullName := include "document-engine.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $labels := include "document-engine.labels" . -}}
{{- range $routeName, $routeConfig := .Values.gateway.extraHTTPRoutes }}
{{- if $routeConfig.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-{{ $routeName }}
  labels:
    {{- $labels | nindent 4 }}
    {{- with $routeConfig.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $routeConfig.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $routeConfig.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $routeConfig.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if $routeConfig.rules }}
    {{- range $routeConfig.rules }}
    {{- $rule := deepCopy . }}
    {{- if not (hasKey $rule "backendRefs") }}
    {{- $_ := set $rule "backendRefs" (list (dict "name" $fullName "port" $svcPort)) }}
    {{- end }}
    {{- toYaml (list $rule) | nindent 4 }}
    {{- end }}
    {{- else }}
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
    {{- end }}
{{- end }}
{{- end }}
