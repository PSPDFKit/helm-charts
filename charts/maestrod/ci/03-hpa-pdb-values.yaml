image:
  repository: 111300957880.dkr.ecr.eu-west-1.amazonaws.com/maestrod

licenseSecret:
  name: ""

resources:
  requests:
    cpu: "100m"
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  create: true
  minAvailable: 1
