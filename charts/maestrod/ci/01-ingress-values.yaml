image:
  repository: 111300957880.dkr.ecr.eu-west-1.amazonaws.com/maestrod

licenseSecret:
  name: ""

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 2Gi

subdomainHostName: maestrod-ci
subdomainRootName: example.test

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/rewrite-target: /
  tls:
    enabled: true
