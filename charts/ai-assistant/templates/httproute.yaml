{{- if .Values.gateway.enabled -}}
{{- $fullName := include "ai-assistant.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "ai-assistant.labels" . | nindent 4 }}
    {{- with .Values.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.gateway.parentRefs }}
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  {{- else if .Values.gateway.gateway.enabled }}
  parentRefs:
    - name: {{ $fullName }}
  {{- end }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.gateway.rules }}
    {{- range .Values.gateway.rules }}
    {{- $rule := deepCopy . }}
    {{- if not (hasKey $rule "backendRefs") }}
    {{- $_ := set $rule "backendRefs" (list (dict "name" $fullName "port" $svcPort)) }}
    {{- end }}
    {{- toYaml (list $rule) | nindent 4 }}
    {{- end }}
    {{- else }}
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
    {{- end }}
{{- end }}
